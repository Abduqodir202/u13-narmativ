<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

  <!-- Navbar -->
  <header class="bg-white shadow-md">
    <div class="container mx-auto flex justify-between items-center p-4">
      <h1 class="text-2xl font-bold text-blue-600">MyHome</h1>
      <nav class="space-x-6">
        <a href="#" class="hover:text-blue-500">Home</a>
        <a href="#" class="hover:text-blue-500">About</a>
        <a href="#" class="hover:text-blue-500">Services</a>
        <a href="#" class="hover:text-blue-500">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="bg-blue-600 text-white py-20 text-center">
    <h2 class="text-4xl font-bold mb-4">Welcome to My Website</h2>
    <p class="text-lg mb-6">Build modern websites easily with clean design</p>
    <button class="bg-white text-blue-600 px-6 py-3 rounded-lg font-semibold hover:bg-gray-200">
      Get Started
    </button>
  </section>

  <!-- Features -->
  <section class="py-16 container mx-auto">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <div class="bg-white p-6 rounded-2xl shadow-md text-center">
        <h3 class="text-xl font-semibold mb-2">Fast</h3>
        <p>Optimized for speed and performance.</p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-md text-center">
        <h3 class="text-xl font-semibold mb-2">Responsive</h3>
        <p>Looks great on all devices.</p>
      </div>
      <div class="bg-white p-6 rounded-2xl shadow-md text-center">
        <h3 class="text-xl font-semibold mb-2">Modern</h3>
        <p>Clean and minimal design style.</p>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white text-center p-6">
    <p>© 2026 MyHome. All rights reserved.</p>
  </footer>

</body>
</html>
